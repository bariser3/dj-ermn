<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0c0c0c">
  <title>Now Playing — DJERMN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0c0c0c;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      position: relative;
      overflow: hidden;
    }

    #bg {
      position: fixed;
      inset: -30%;
      background-size: cover;
      background-position: center;
      filter: blur(60px) brightness(0.25) saturate(1.8);
      transition: background-image 1s ease;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 380px;
      transition: opacity 0.3s;
    }
    #app.fading { opacity: 0; }

    .art-wrap {
      width: min(260px, 75vw);
      height: min(260px, 75vw);
      border-radius: 20px;
      overflow: hidden;
      background: #1a1a1a;
      box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06);
      margin-bottom: 36px;
      flex-shrink: 0;
    }
    .art-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .art-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .art-placeholder svg { width: 56px; height: 56px; opacity: 0.15; }

    .title {
      font-size: clamp(1.15rem, 5.5vw, 1.6rem);
      font-weight: 800;
      text-align: center;
      letter-spacing: -0.3px;
      line-height: 1.25;
      margin-bottom: 10px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }
    .artist {
      font-size: clamp(0.85rem, 3.5vw, 1rem);
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      text-align: center;
      margin-bottom: 24px;
    }

    .badges { display: flex; gap: 8px; justify-content: center; margin-bottom: 36px; }
    .badge { font-size: 0.68rem; font-weight: 700; padding: 5px 14px; border-radius: 999px; letter-spacing: 0.3px; backdrop-filter: blur(8px); }
    .badge-bpm { background: rgba(30,24,0,0.9); color: #e6b84c; border: 1px solid rgba(230,184,76,0.25); }
    .badge-key { background: rgba(4,43,18,0.9); color: #4ade80; border: 1px solid rgba(74,222,128,0.2); }

    .live { display: flex; align-items: center; gap: 7px; font-size: 0.6rem; font-weight: 700; color: rgba(255,255,255,0.25); letter-spacing: 0.18em; text-transform: uppercase; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 6px #ef4444; animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }

    .idle { text-align: center; color: rgba(255,255,255,0.3); }
    .idle svg { width: 48px; height: 48px; margin-bottom: 20px; opacity: 0.2; }
    .idle h2 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
    .idle p { font-size: 0.8rem; opacity: 0.6; }
  </style>
</head>
<body>
<div id="bg"></div>
<div id="app">
  <div class="idle">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zm12 0a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
    </svg>
    <h2>Verbinde...</h2>
    <p>Warte auf Rekordbox</p>
  </div>
</div>

<script>
  const RAW = 'https://djermn.github.io/now-playing.json';
  const bg  = document.getElementById('bg');
  const app = document.getElementById('app');
  let lastTitle = null;

  const NOTE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:56px;height:56px;opacity:0.15">
    <path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zm12 0a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
  </svg>`;

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function render(data) {
    if (!data.title) {
      bg.style.backgroundImage = '';
      app.innerHTML = `<div class="idle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zm12 0a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
        </svg>
        <h2>Warte auf ersten Song...</h2>
        <p>DJERMN startet gleich</p>
      </div>`;
      return;
    }

    if (data.artwork) bg.style.backgroundImage = `url('${data.artwork}')`;
    else bg.style.backgroundImage = '';

    const art = data.artwork
      ? `<img src="${esc(data.artwork)}" alt="Cover">`
      : `<div class="art-placeholder">${NOTE}</div>`;

    const bpm = data.bpm ? `<span class="badge badge-bpm">${data.bpm} BPM</span>` : '';
    const key = data.key ? `<span class="badge badge-key">${esc(data.key)}</span>` : '';

    app.innerHTML = `
      <div class="art-wrap">${art}</div>
      <div class="title">${esc(data.title)}</div>
      <div class="artist">${esc(data.artist || '')}</div>
      ${(bpm || key) ? `<div class="badges">${bpm}${key}</div>` : ''}
      <div class="live"><span class="live-dot"></span>Live</div>`;
  }

  async function poll() {
    try {
      const url = RAW + '?_=' + Date.now();
      const r = await fetch(url, { cache: 'no-store' });
      if (!r.ok) return;
      const data = await r.json();
      if (data.title !== lastTitle) {
        app.classList.add('fading');
        setTimeout(() => {
          lastTitle = data.title;
          render(data);
          app.classList.remove('fading');
        }, 300);
      }
    } catch (_) {}
  }

  poll();
  setInterval(poll, 5000);
</script>
</body>
</html>
